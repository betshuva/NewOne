plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace = "com.betshuva.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    signingConfigs {
        release {
            storeFile = file("betshuva-release.jks")
            storePassword = System.getenv("KEYSTORE_PASSWORD") ?: "betshuva2024"
            keyAlias = System.getenv("KEY_ALIAS") ?: "betshuva"
            keyPassword = System.getenv("KEY_PASSWORD") ?: "betshuva2024"
        }
    }

    defaultConfig {
        applicationId = "com.betshuva.app"
        minSdk = 26
        targetSdk = flutter.targetSdkVersion
        versionCode = 1
        versionName = "1.0.0"
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}
