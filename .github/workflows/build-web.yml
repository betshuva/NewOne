name: Build Web

on:
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-web.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Web
        working-directory: flutter_app
        run: flutter build web --release --base-href "/"

      - name: Deploy web build to repo root
        run: |
          cp -r flutter_app/build/web/. .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flutter.js flutter_bootstrap.js flutter_service_worker.js \
                  main.dart.js manifest.json assets/ canvaskit/ icons/ favicon.png
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "build: update web v$(grep '^version:' flutter_app/pubspec.yaml | awk '{print $2}') [skip ci]"
          git push
