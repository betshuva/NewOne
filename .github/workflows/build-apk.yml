name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Rename APK with version
        working-directory: flutter_app
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | awk '{print $2}')
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/betshuva-${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: betshuva-apk
          path: flutter_app/build/app/outputs/flutter-apk/betshuva-*.apk
          retention-days: 30

      - name: Update app-release.apk and version on website
        run: |
          VERSION=$(grep "^version:" flutter_app/pubspec.yaml | awk '{print $2}')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fetch latest remote state
          git fetch origin main
          git reset --hard origin/main
          # Overwrite files with fresh build output
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk app-release.apk
          echo "{\"app_name\":\"betshuva\",\"version\":\"${VERSION}\",\"package_name\":\"betshuva\"}" > version.json
          sed -i "s/version: '[^']*'/version: '${VERSION}'/" server/index.js
          git add app-release.apk version.json server/index.js
          git commit -m "build: release v${VERSION} [skip ci]" || echo "No changes"
          git push
