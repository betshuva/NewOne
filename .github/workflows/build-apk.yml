name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Rename APK with version
        working-directory: flutter_app
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | awk '{print $2}')
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/betshuva-${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: betshuva-apk
          path: flutter_app/build/app/outputs/flutter-apk/betshuva-*.apk
          retention-days: 30

      - name: Update app-release.apk on website
        run: |
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk app-release.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-release.apk
          git commit -m "build: update app-release.apk [skip ci]" || echo "No changes"
          git push
