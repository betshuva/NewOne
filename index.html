<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איקס אפס</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2.5rem;
      color: #e94560;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.3rem;
      color: #a8dadc;
      min-height: 2rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 40px;
      font-size: 1.1rem;
      color: #a8dadc;
    }

    #scores span { color: #e94560; font-weight: bold; }

    #reset {
      padding: 12px 36px;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #reset:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>איקס אפס ✕ ○</h1>

  <div id="scores">
    <div>✕ ניצח: <span id="score-x">0</span></div>
    <div>תיקו: <span id="score-tie">0</span></div>
    <div>○ ניצח: <span id="score-o">0</span></div>
  </div>

  <div id="status">תור השחקן: ✕</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">משחק חדש</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreTie = document.getElementById('score-tie');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = `תור השחקן: ✕`;
    }

    function checkWin(player) {
      return WINS.find(combo => combo.every(i => board[i] === player)) || null;
    }

    function handleClick(e) {
      const i = +e.target.dataset.i;
      if (gameOver || board[i]) return;

      board[i] = current;
      const cell = e.target;
      cell.textContent = current === 'X' ? '✕' : '○';
      cell.classList.add(current.toLowerCase(), 'taken');

      const winCombo = checkWin(current);
      if (winCombo) {
        gameOver = true;
        winCombo.forEach(j => cells[j].classList.add('win'));
        const symbol = current === 'X' ? '✕' : '○';
        status.textContent = `🎉 ${symbol} ניצח!`;
        if (current === 'X') scoreX.textContent = +scoreX.textContent + 1;
        else scoreO.textContent = +scoreO.textContent + 1;
      } else if (board.every(Boolean)) {
        gameOver = true;
        status.textContent = '🤝 תיקו!';
        scoreTie.textContent = +scoreTie.textContent + 1;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `תור השחקן: ${current === 'X' ? '✕' : '○'}`;
      }
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
