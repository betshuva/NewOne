<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="בתשובה — מסרים לקהילה החרדית">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="בתשובה">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>בתשובה</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #apk-banner {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2147483647;
      background: #1B6CA8;
      color: #fff;
      border-radius: 32px;
      padding: 14px 28px;
      font-family: 'Heebo', 'Arial Hebrew', Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(27,108,168,.45);
      display: none;
      align-items: center;
      gap: 10px;
      direction: rtl;
      transition: transform .15s, box-shadow .15s;
      pointer-events: auto;
    }
    #apk-banner:hover {
      transform: translateX(-50%) scale(1.04);
      box-shadow: 0 8px 32px rgba(27,108,168,.6);
    }
    #apk-banner svg { flex-shrink: 0; }
    #apk-dismiss {
      position: fixed;
      bottom: 78px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2147483647;
      background: rgba(13,79,130,.85);
      border: none;
      color: #fff;
      font-size: 11px;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      display: none;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <!-- APK download banner — shown only on Android -->
  <a id="apk-banner" href="/app-release.apk" download="betshuva.apk">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 16l-5-5h3V4h4v7h3l-5 5z" fill="white"/>
      <path d="M5 20h14v-2H5v2z" fill="white"/>
    </svg>
    <span>
      הורד אפליקציה לאנדרואיד
      <span id="apk-version" style="font-size:12px;font-weight:400;opacity:.8;margin-right:4px;"></span>
    </span>
  </a>
  <button id="apk-dismiss">✕ סגור</button>

  <script>
    // Force clear old service workers and caches
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
    }
    if ('caches' in window) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }

    // Show APK banner (Android only), unless dismissed
    (function() {
      var isAndroid = /Android/i.test(navigator.userAgent);
      var dismissed = sessionStorage.getItem('apk-banner-dismissed');
      if (!isAndroid || dismissed) return;

      var banner  = document.getElementById('apk-banner');
      var dismiss = document.getElementById('apk-dismiss');
      var verEl   = document.getElementById('apk-version');

      // Load version then show
      fetch('/version.json?_=' + Date.now())
        .then(function(r){ return r.json(); })
        .then(function(d){
          if (d.version) verEl.textContent = 'v' + d.version;
        })
        .catch(function(){})
        .finally(function(){
          banner.style.display  = 'flex';
          dismiss.style.display = 'block';
        });

      dismiss.addEventListener('click', function() {
        banner.style.display  = 'none';
        dismiss.style.display = 'none';
        sessionStorage.setItem('apk-banner-dismissed', '1');
      });
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
