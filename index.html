<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איקס אפס</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #eee;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 24px; padding: 20px;
    }
    h1 { font-size: 2.5rem; color: #e94560; letter-spacing: 2px; }
    h2 { color: #a8dadc; font-size: 1.4rem; margin-bottom: 8px; }
    .screen { display: none; flex-direction: column; align-items: center; gap: 16px; width: 100%; max-width: 380px; }
    .screen.active { display: flex; }
    input, select {
      width: 100%; padding: 12px 16px; border-radius: 8px;
      border: 2px solid #0f3460; background: #16213e; color: #eee; font-size: 1rem;
    }
    input:focus, select:focus { outline: none; border-color: #e94560; }
    .btn { width: 100%; padding: 12px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: #e94560; color: white; }
    .btn-primary:hover { background: #c73652; }
    .btn-secondary { background: #0f3460; color: #a8dadc; }
    .btn-secondary:hover { background: #162340; }
    .tabs { display: flex; gap: 8px; width: 100%; }
    .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; background: #16213e; color: #a8dadc; border: 2px solid transparent; }
    .tab.active { border-color: #e94560; color: #e94560; }
    .msg { font-size: 0.9rem; color: #e94560; min-height: 1.2rem; text-align: center; }
    .msg.ok { color: #a8dadc; }
    #board { display: grid; grid-template-columns: repeat(3, 110px); grid-template-rows: repeat(3, 110px); gap: 8px; }
    .cell { background: #16213e; border: 2px solid #0f3460; border-radius: 12px; font-size: 3rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s, transform 0.1s; user-select: none; }
    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.05); }
    .cell.x { color: #e94560; } .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; border-color: #e94560; animation: pulse 0.5s ease; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    #status { font-size: 1.3rem; color: #a8dadc; min-height: 2rem; text-align: center; }
    #scores { display: flex; gap: 40px; font-size: 1.1rem; color: #a8dadc; text-align: center; }
    #scores span { color: #e94560; font-weight: bold; display: block; }
    .game-buttons { display: flex; gap: 12px; }
    .game-buttons .btn { width: auto; padding: 12px 24px; }
    .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #16213e; border-radius: 8px; margin-bottom: 8px; width: 100%; }
    .user-item .name { font-weight: bold; color: #a8dadc; }
    .user-item .sub { font-size: 0.85rem; color: #666; }
    .user-item .wins { color: #e94560; font-weight: bold; }
    .loader { width: 36px; height: 36px; border: 4px solid #0f3460; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modals */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-box { background: #16213e; border: 2px solid #0f3460; border-radius: 16px; padding: 28px 24px; text-align: center; max-width: 300px; width: 90%; display: flex; flex-direction: column; gap: 16px; }
    .modal-box h2 { margin: 0; }
    .modal-box p { color: #a8dadc; font-size: 1rem; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .modal-btns .btn { width: auto; padding: 10px 22px; }
  </style>
</head>
<body>
  <h1>איקס אפס ✕ ○</h1>

  <!-- Loading -->
  <div id="screen-loading" class="screen active">
    <div class="loader"></div>
  </div>

  <!-- Auth -->
  <div id="screen-auth" class="screen">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">כניסה</div>
      <div class="tab" onclick="switchTab('register')">הרשמה</div>
    </div>
    <div id="tab-register" style="display:none; width:100%; flex-direction:column; gap:12px;">
      <h2>הרשמה</h2>
      <input id="reg-name" type="text" placeholder="שם מלא" />
      <input id="reg-email" type="email" placeholder="אימייל" />
      <input id="reg-pass" type="password" placeholder="סיסמה (6+ תווים)" />
      <button class="btn btn-primary" onclick="register()">הרשמה</button>
    </div>
    <div id="tab-login" style="width:100%; display:flex; flex-direction:column; gap:12px;">
      <h2>כניסה</h2>
      <input id="login-email" type="email" placeholder="אימייל" />
      <input id="login-pass" type="password" placeholder="סיסמה" />
      <button class="btn btn-primary" onclick="login()">כניסה</button>
    </div>
    <p class="msg" id="auth-msg"></p>
  </div>

  <!-- Lobby -->
  <div id="screen-lobby" class="screen">
    <h2 id="lobby-title"></h2>
    <p style="color:#666; font-size:0.9rem;">בחר יריב מחובר:</p>
    <select id="opponent-select"></select>
    <button class="btn btn-primary" onclick="sendInvite()">הזמן למשחק</button>
    <button class="btn btn-secondary" onclick="toggleLeaderboard()">🏆 טבלת ניצחונות</button>
    <button class="btn btn-secondary" onclick="logout()">התנתק</button>
    <p class="msg" id="lobby-msg"></p>
    <div id="leaderboard" style="display:none; width:100%;"></div>
  </div>

  <!-- Game -->
  <div id="screen-game" class="screen">
    <div id="scores">
      <div><span id="p1-name">שחקן 1</span><span id="score-x">0</span></div>
      <div>תיקו<span id="score-tie">0</span></div>
      <div><span id="p2-name">שחקן 2</span><span id="score-o">0</span></div>
    </div>
    <div id="status"></div>
    <div id="board">
      <div class="cell" data-i="0"></div><div class="cell" data-i="1"></div><div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div><div class="cell" data-i="4"></div><div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div><div class="cell" data-i="7"></div><div class="cell" data-i="8"></div>
    </div>
    <div class="game-buttons">
      <button class="btn btn-primary" onclick="resetGame()">משחק חדש</button>
      <button class="btn btn-secondary" onclick="goLobby()">חזרה</button>
    </div>
  </div>

  <!-- Modal: incoming invite -->
  <div id="modal-invite" class="modal">
    <div class="modal-box">
      <h2>הזמנה למשחק!</h2>
      <p><strong id="invite-from-name"></strong> מזמין אותך למשחק</p>
      <div class="modal-btns">
        <button class="btn btn-primary" onclick="acceptInvite()">קבל</button>
        <button class="btn btn-secondary" onclick="declineInvite()">דחה</button>
      </div>
    </div>
  </div>

  <!-- Modal: waiting for response -->
  <div id="modal-waiting" class="modal">
    <div class="modal-box">
      <h2>ממתין...</h2>
      <p>ממתין לתשובה מ-<strong id="waiting-name"></strong></p>
      <div class="loader" style="margin: 0 auto;"></div>
      <button class="btn btn-secondary" onclick="cancelInvite()">בטל</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const API = window.location.hostname === 'localhost'
      ? 'http://localhost:3000/api'
      : 'https://xo-app-betshuva.azurewebsites.net/api';
    const SOCKET_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3000'
      : 'https://xo-app-betshuva.azurewebsites.net';

    let token = localStorage.getItem('ttt_token');
    let currentUser = JSON.parse(localStorage.getItem('ttt_user') || 'null');
    let socket = null;
    let mySymbol = null;      // 'X' (inviter) or 'O' (invitee)
    let opponentUser = null;
    let isMyTurn = false;
    let pendingInviteFrom = null;
    let board, gameOver;
    let scoreX = 0, scoreO = 0, scoreTie = 0;

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    // ── API ───────────────────────────────────────────────────────
    async function api(path, options = {}) {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
        ...options,
        body: options.body ? JSON.stringify(options.body) : undefined,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'שגיאה');
      return data;
    }

    // ── Screen ────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
      document.getElementById('tab-login').style.display    = tab === 'login'    ? 'flex' : 'none';
      document.getElementById('tab-register').style.display = tab === 'register' ? 'flex' : 'none';
    }

    function setMsg(msg, ok = false) {
      const el = document.getElementById('auth-msg');
      el.textContent = msg;
      el.className = 'msg' + (ok ? ' ok' : '');
    }

    function setLobbyMsg(msg) {
      document.getElementById('lobby-msg').textContent = msg;
    }

    // ── Socket ────────────────────────────────────────────────────
    function connectSocket() {
      socket = io(SOCKET_URL, { auth: { token } });

      socket.on('users:online', (userIds) => {
        window._onlineUsers = new Set(userIds);
        refreshOpponentSelect();
      });

      socket.on('game:invite', ({ from }) => {
        pendingInviteFrom = from;
        document.getElementById('invite-from-name').textContent = from.name;
        showModal('modal-invite');
      });

      socket.on('game:accepted', ({ by }) => {
        hideModal('modal-waiting');
        opponentUser = by;
        mySymbol = 'X';
        isMyTurn = true;
        startMultiplayerGame();
      });

      socket.on('game:declined', () => {
        hideModal('modal-waiting');
        setLobbyMsg(`${opponentUser?.name || 'היריב'} דחה את ההזמנה`);
        opponentUser = null;
      });

      socket.on('game:cancel', () => {
        if (document.getElementById('screen-game').classList.contains('active')) {
          document.getElementById('status').textContent = '⚠️ היריב עזב את המשחק';
          gameOver = true;
        } else {
          hideModal('modal-invite');
          pendingInviteFrom = null;
        }
      });

      socket.on('game:move', ({ index }) => {
        const oppSymbol = mySymbol === 'X' ? 'O' : 'X';
        applyMove(index, oppSymbol);
        isMyTurn = true;
        updateStatus();
        const winCombo = checkWin(oppSymbol);
        if (winCombo) endGame(winCombo, oppSymbol);
        else if (board.every(Boolean)) endGame(null, null);
      });

      socket.on('game:rematch', () => initGame());

      socket.on('disconnect', () => {
        window._onlineUsers = new Set();
        refreshOpponentSelect();
        if (document.getElementById('screen-game').classList.contains('active')) {
          document.getElementById('status').textContent = '⚠️ התנתקות — נסה לרענן';
          gameOver = true;
        }
      });
    }

    function disconnectSocket() {
      if (socket) { socket.disconnect(); socket = null; }
    }

    // ── Auth ──────────────────────────────────────────────────────
    async function register() {
      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-pass').value;
      if (!name || !email || !password) return setMsg('מלא את כל השדות');
      try {
        const data = await api('/register', { method: 'POST', body: { name, email, password } });
        token = data.token; currentUser = data.user;
        localStorage.setItem('ttt_token', token);
        localStorage.setItem('ttt_user', JSON.stringify(currentUser));
        connectSocket();
        openLobby();
      } catch (e) { setMsg(e.message); }
    }

    async function login() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-pass').value;
      try {
        const data = await api('/login', { method: 'POST', body: { email, password } });
        token = data.token; currentUser = data.user;
        localStorage.setItem('ttt_token', token);
        localStorage.setItem('ttt_user', JSON.stringify(currentUser));
        connectSocket();
        openLobby();
      } catch (e) { setMsg(e.message); }
    }

    function logout() {
      disconnectSocket();
      token = null; currentUser = null;
      localStorage.removeItem('ttt_token');
      localStorage.removeItem('ttt_user');
      showScreen('screen-auth');
    }

    // ── Lobby ─────────────────────────────────────────────────────
    async function openLobby() {
      document.getElementById('lobby-title').textContent = `שלום, ${currentUser.name}!`;
      setLobbyMsg('');
      try {
        const users = await api('/users');
        window._others = users.filter(u => u.id !== currentUser.id);
        refreshOpponentSelect();
      } catch (e) { console.error(e); }
      document.getElementById('leaderboard').style.display = 'none';
      showScreen('screen-lobby');
    }

    function refreshOpponentSelect() {
      if (!window._others) return;
      const online = window._onlineUsers || new Set();
      const sel = document.getElementById('opponent-select');
      if (!window._others.length) {
        sel.innerHTML = '<option disabled>אין שחקנים אחרים עדיין</option>';
        return;
      }
      sel.innerHTML = window._others.map(u => {
        const on = online.has(u.id);
        return `<option value="${u.id}" ${!on ? 'disabled' : ''}>${on ? '🟢' : '⚫'} ${u.name} (🏆 ${u.wins})${!on ? ' — לא מחובר' : ''}</option>`;
      }).join('');
    }

    function goLobby() {
      if (opponentUser && socket) {
        socket.emit('game:cancel', { toUserId: opponentUser.id });
      }
      opponentUser = null;
      openLobby();
    }

    // ── Invite flow ───────────────────────────────────────────────
    function sendInvite() {
      const sel = document.getElementById('opponent-select');
      const uid = sel.value;
      if (!uid) return setLobbyMsg('בחר יריב מחובר');
      const opp = (window._others || []).find(u => u.id === uid);
      if (!opp) return;
      if (!(window._onlineUsers || new Set()).has(uid)) return setLobbyMsg('היריב לא מחובר');
      opponentUser = opp;
      socket.emit('game:invite', { toUserId: opp.id });
      document.getElementById('waiting-name').textContent = opp.name;
      showModal('modal-waiting');
    }

    function cancelInvite() {
      if (opponentUser && socket) socket.emit('game:cancel', { toUserId: opponentUser.id });
      opponentUser = null;
      hideModal('modal-waiting');
    }

    function acceptInvite() {
      if (!pendingInviteFrom) return;
      socket.emit('game:accept', { toUserId: pendingInviteFrom.id });
      opponentUser = pendingInviteFrom;
      mySymbol = 'O';
      isMyTurn = false;
      pendingInviteFrom = null;
      hideModal('modal-invite');
      startMultiplayerGame();
    }

    function declineInvite() {
      if (!pendingInviteFrom) return;
      socket.emit('game:decline', { toUserId: pendingInviteFrom.id });
      pendingInviteFrom = null;
      hideModal('modal-invite');
    }

    function showModal(id) { document.getElementById(id).classList.add('show'); }
    function hideModal(id)  { document.getElementById(id).classList.remove('show'); }

    // ── Game ──────────────────────────────────────────────────────
    function startMultiplayerGame() {
      scoreX = scoreO = scoreTie = 0;
      const xName = mySymbol === 'X' ? currentUser.name : opponentUser.name;
      const oName = mySymbol === 'O' ? currentUser.name : opponentUser.name;
      document.getElementById('p1-name').textContent = xName;
      document.getElementById('p2-name').textContent = oName;
      document.getElementById('score-x').textContent = '0';
      document.getElementById('score-o').textContent = '0';
      document.getElementById('score-tie').textContent = '0';
      showScreen('screen-game');
      initGame();
    }

    function initGame() {
      board = Array(9).fill('');
      gameOver = false;
      isMyTurn = mySymbol === 'X';
      document.querySelectorAll('.cell').forEach(c => { c.textContent = ''; c.className = 'cell'; });
      updateStatus();
    }

    function updateStatus() {
      if (gameOver) return;
      document.getElementById('status').textContent = isMyTurn
        ? `תורך (${mySymbol === 'X' ? '✕' : '○'})`
        : `תור ${opponentUser?.name || 'יריב'}`;
    }

    function checkWin(symbol) {
      return WINS.find(c => c.every(i => board[i] === symbol)) || null;
    }

    function applyMove(i, symbol) {
      board[i] = symbol;
      const cell = document.querySelectorAll('.cell')[i];
      cell.textContent = symbol === 'X' ? '✕' : '○';
      cell.classList.add(symbol.toLowerCase(), 'taken');
    }

    function handleCellClick(e) {
      const i = +e.target.dataset.i;
      if (gameOver || board[i] || !isMyTurn || !socket || !opponentUser) return;

      applyMove(i, mySymbol);
      isMyTurn = false;
      socket.emit('game:move', { toUserId: opponentUser.id, index: i });
      updateStatus();

      const winCombo = checkWin(mySymbol);
      if (winCombo) endGame(winCombo, mySymbol);
      else if (board.every(Boolean)) endGame(null, null);
    }

    function endGame(winCombo, winnerSymbol) {
      gameOver = true;
      let winnerId = null;
      let result;

      if (winnerSymbol) {
        winCombo.forEach(j => document.querySelectorAll('.cell')[j].classList.add('win'));
        const winnerIsMe = winnerSymbol === mySymbol;
        const winnerUser = winnerIsMe ? currentUser : opponentUser;
        winnerId = winnerUser.id;
        result = 'win';
        document.getElementById('status').textContent = `🎉 ${winnerUser.name} ניצח!`;
        if (winnerSymbol === 'X') { scoreX++; document.getElementById('score-x').textContent = scoreX; }
        else                      { scoreO++; document.getElementById('score-o').textContent = scoreO; }
      } else {
        result = 'tie';
        scoreTie++;
        document.getElementById('score-tie').textContent = scoreTie;
        document.getElementById('status').textContent = '🤝 תיקו!';
      }

      // Only X player saves to avoid duplicate DB entries
      if (mySymbol === 'X') {
        const oUser = opponentUser;
        api('/games', {
          method: 'POST',
          body: { player1_id: currentUser.id, player2_id: oUser.id, winner_id: winnerId, result, board }
        }).catch(e => console.error('שמירה נכשלה', e));
      }
    }

    function resetGame() {
      if (socket && opponentUser) socket.emit('game:rematch', { toUserId: opponentUser.id });
      initGame();
    }

    // ── Leaderboard ───────────────────────────────────────────────
    async function toggleLeaderboard() {
      const lb = document.getElementById('leaderboard');
      if (lb.style.display !== 'none') { lb.style.display = 'none'; return; }
      try {
        const users = await api('/leaderboard');
        lb.innerHTML = '<h2 style="margin:12px 0 8px">🏆 טבלת ניצחונות</h2>' +
          users.map(u => `<div class="user-item">
            <div><div class="name">${u.name}</div><div class="sub">${u.email}</div></div>
            <div class="wins">🏆 ${u.wins} / ${u.games_played}</div>
          </div>`).join('');
        lb.style.display = 'block';
      } catch (e) { console.error(e); }
    }

    document.querySelectorAll('.cell').forEach(c => c.addEventListener('click', handleCellClick));

    // ── Init ──────────────────────────────────────────────────────
    if (token && currentUser) {
      connectSocket();
      openLobby().catch(() => logout());
    } else {
      switchTab('login');
      showScreen('screen-auth');
    }
  </script>
</body>
</html>
