<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול DB — איקס אפס</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 24px; }
    h1 { color: #e94560; margin-bottom: 24px; font-size: 1.8rem; }
    h2 { color: #a8dadc; margin: 32px 0 12px; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
    .badge-count { background: #0f3460; color: #a8dadc; padding: 2px 10px; border-radius: 10px; font-size: 0.85rem; }
    table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
    th { background: #0f3460; color: #a8dadc; padding: 10px 14px; text-align: right; font-size: 0.85rem; white-space: nowrap; }
    td { padding: 9px 14px; border-bottom: 1px solid #0f3460; font-size: 0.85rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1b2d50; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 0.78rem; font-weight: bold; }
    .win  { background: #1a3a25; color: #4caf50; }
    .tie  { background: #2e2a10; color: #ffc107; }
    .board-cell { display: inline-block; width: 18px; text-align: center; font-weight: bold; }
    .board-cell.x { color: #e94560; }
    .board-cell.o { color: #a8dadc; }
    .board-cell.empty { color: #444; }
    .board-grid { display: inline-grid; grid-template-columns: repeat(3, 20px); gap: 1px; background: #0f3460; border: 1px solid #0f3460; border-radius: 4px; padding: 2px; }
    .loader { color: #a8dadc; padding: 40px; text-align: center; font-size: 1.1rem; }
    .error { color: #e94560; padding: 20px; }
    .refresh-btn { background: #e94560; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-bottom: 8px; }
    .refresh-btn:hover { background: #c73652; }
    .back-link { color: #a8dadc; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
    .back-link:hover { color: #e94560; }
    .stats-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
    .stat-card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 12px 20px; text-align: center; }
    .stat-card .num { font-size: 1.8rem; font-weight: bold; color: #e94560; }
    .stat-card .label { font-size: 0.8rem; color: #a8dadc; }
  </style>
</head>
<body>
  <a class="back-link" href="/">← חזרה למשחק</a>
  <h1>🗄️ נתוני מערכת — בסיס נתונים</h1>
  <button class="refresh-btn" onclick="loadAll()">🔄 רענן</button>

  <div class="stats-row" id="stats-row"></div>

  <h2>👤 טבלת users <span class="badge-count" id="users-count"></span></h2>
  <div id="users-table"><div class="loader">טוען...</div></div>

  <h2>🎮 טבלת games <span class="badge-count" id="games-count"></span></h2>
  <div id="games-table"><div class="loader">טוען...</div></div>

  <script>
    const API = window.location.hostname === 'localhost'
      ? 'http://localhost:3000/api'
      : 'https://xo-app-betshuva.azurewebsites.net/api';

    const token = localStorage.getItem('ttt_token');

    async function apiFetch(path) {
      const res = await fetch(API + path, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('he-IL') + ' ' + d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
    }

    function renderBoard(boardStr) {
      if (!boardStr) return '—';
      const cells = boardStr.split(',');
      return `<div class="board-grid">${cells.map(c => {
        const cls = c === 'X' ? 'x' : c === 'O' ? 'o' : 'empty';
        return `<span class="board-cell ${cls}">${c || '·'}</span>`;
      }).join('')}</div>`;
    }

    async function loadAll() {
      if (!token) {
        document.body.innerHTML = '<div style="padding:40px;color:#e94560;font-size:1.2rem">⚠️ יש להתחבר קודם ב<a href="/" style="color:#a8dadc">דף הראשי</a></div>';
        return;
      }
      try {
        const [users, games] = await Promise.all([
          apiFetch('/admin/users'),
          apiFetch('/admin/games')
        ]);

        // Stats
        const wins = games.filter(g => g.result === 'win').length;
        const ties = games.filter(g => g.result === 'tie').length;
        document.getElementById('stats-row').innerHTML = `
          <div class="stat-card"><div class="num">${users.length}</div><div class="label">משתמשים</div></div>
          <div class="stat-card"><div class="num">${games.length}</div><div class="label">משחקים</div></div>
          <div class="stat-card"><div class="num">${wins}</div><div class="label">ניצחונות</div></div>
          <div class="stat-card"><div class="num">${ties}</div><div class="label">תיקו</div></div>
        `;

        // Users table
        document.getElementById('users-count').textContent = users.length + ' רשומות';
        document.getElementById('users-table').innerHTML = `
          <table>
            <thead><tr><th>#</th><th>שם</th><th>אימייל</th><th>ניצחונות</th><th>משחקים</th><th>% ניצחון</th><th>הצטרף</th></tr></thead>
            <tbody>
              ${users.map((u, i) => {
                const pct = u.games_played ? Math.round(u.wins / u.games_played * 100) : 0;
                return `<tr>
                  <td>${i + 1}</td>
                  <td><strong>${u.name}</strong></td>
                  <td>${u.email}</td>
                  <td style="color:#e94560;font-weight:bold">${u.wins}</td>
                  <td>${u.games_played}</td>
                  <td>${pct}%</td>
                  <td>${formatDate(u.created_at)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`;

        // Games table
        document.getElementById('games-count').textContent = games.length + ' רשומות';
        document.getElementById('games-table').innerHTML = `
          <table>
            <thead><tr><th>#</th><th>שחקן X</th><th>שחקן O</th><th>מנצח</th><th>תוצאה</th><th>לוח</th><th>תאריך</th></tr></thead>
            <tbody>
              ${games.map((g, i) => `<tr>
                <td>${i + 1}</td>
                <td>${g.player1}</td>
                <td>${g.player2}</td>
                <td>${g.winner ? `<strong>${g.winner}</strong>` : '—'}</td>
                <td><span class="badge ${g.result}">${g.result === 'win' ? '🏆 ניצחון' : '🤝 תיקו'}</span></td>
                <td>${renderBoard(g.board)}</td>
                <td>${formatDate(g.played_at)}</td>
              </tr>`).join('')}
            </tbody>
          </table>`;

      } catch (e) {
        document.getElementById('users-table').innerHTML = `<div class="error">שגיאה: ${e.message}</div>`;
      }
    }

    loadAll();
  </script>
</body>
</html>
