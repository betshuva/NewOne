<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>בתשובה — לוח ניהול DB</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#0D1117;color:#E6EDF3;height:100vh;display:flex;flex-direction:column}
:root{
  --blue:#1B6CA8;--blue-dark:#0D4F82;--blue-light:#3A8FCC;
  --bg:#0D1117;--bg2:#161B22;--bg3:#21262D;
  --border:#30363D;--text:#E6EDF3;--text2:#8B949E;
  --green:#3FB950;--orange:#D29922;--red:#F85149;
}

/* ── LOGIN ── */
#login-wrap{display:flex;align-items:center;justify-content:center;flex:1;background:var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:360px}
.login-card h1{font-size:22px;font-weight:700;color:var(--blue-light);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--text2);margin-bottom:24px}
.lc-field{margin-bottom:14px}
.lc-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.lc-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Heebo',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border .2s}
.lc-field input:focus{border-color:var(--blue)}
.lc-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.lc-btn:hover{background:var(--blue-dark)}
.lc-err{background:rgba(248,81,73,.12);color:var(--red);border-radius:6px;padding:8px 12px;font-size:13px;margin-bottom:12px;display:none}

/* ── APP SHELL ── */
#app{display:none;flex:1;overflow:hidden;flex-direction:row}

/* Sidebar */
.sidebar{width:220px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:16px 14px;border-bottom:1px solid var(--border)}
.sb-head h2{font-size:15px;font-weight:700;color:var(--blue-light)}
.sb-perm{font-size:11px;margin-top:3px;padding:2px 8px;border-radius:10px;display:inline-block}
.perm-edit{background:rgba(63,185,80,.15);color:var(--green)}
.perm-view{background:rgba(210,153,34,.15);color:var(--orange)}
.sb-item{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text2);display:flex;justify-content:space-between;align-items:center;transition:background .15s;border-right:3px solid transparent}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--bg3);color:var(--blue-light);border-right-color:var(--blue)}
.sb-item .cnt{background:var(--bg);color:var(--text2);font-size:11px;padding:1px 7px;border-radius:8px}
.sb-section{padding:8px 14px 4px;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:8px}
.sb-footer{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border)}
.sb-user{font-size:12px;color:var(--text2)}
.sb-logout{font-size:12px;color:var(--red);cursor:pointer;margin-top:4px}
.sb-logout:hover{text-decoration:underline}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.main-head h1{font-size:17px;font-weight:700;flex:1}
.main-head .cnt-badge{background:var(--bg3);color:var(--text2);font-size:12px;padding:3px 10px;border-radius:10px}
.search-wrap{display:flex;gap:8px}
.search-wrap input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:'Heebo',sans-serif;font-size:13px;color:var(--text);outline:none;width:220px}
.search-wrap input:focus{border-color:var(--blue)}
.btn-sm{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-family:'Heebo',sans-serif;font-size:13px;cursor:pointer}
.btn-sm:hover{background:var(--blue-dark)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-family:'Heebo',sans-serif;font-size:13px;cursor:pointer}
.btn-outline:hover{border-color:var(--blue);color:var(--blue-light)}

/* Table */
.table-wrap{flex:1;overflow:auto;padding:0}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:2}
th{background:var(--bg3);color:var(--text2);padding:9px 14px;text-align:right;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 14px;border-bottom:1px solid var(--border);color:var(--text);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:rgba(33,38,45,.8)}
.td-bool-true{color:var(--green);font-weight:600}
.td-bool-false{color:var(--red)}
.td-date{color:var(--text2);font-size:12px}
.td-id{color:var(--text2);font-family:monospace;font-size:11px}
.td-actions{white-space:nowrap;text-align:left}
.btn-edit{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:5px;padding:3px 10px;font-size:12px;cursor:pointer}
.btn-edit:hover{border-color:var(--blue);color:var(--blue-light)}
.btn-del{background:transparent;border:1px solid transparent;color:var(--text2);border-radius:5px;padding:3px 10px;font-size:12px;cursor:pointer}
.btn-del:hover{border-color:var(--red);color:var(--red)}

/* Pagination */
.pagination{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);flex-shrink:0}
.pag-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 14px;cursor:pointer;font-size:13px}
.pag-btn:hover:not(:disabled){background:var(--bg);color:var(--text)}
.pag-btn:disabled{opacity:.4;cursor:default}

/* Edit Modal */
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;align-items:center;justify-content:center}
.em-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:520px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column}
.em-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.em-head h2{font-size:16px;font-weight:700;color:var(--blue-light)}
.em-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px 8px}
.em-close:hover{color:var(--text)}
.em-body{padding:18px 20px;overflow-y:auto;flex:1}
.em-field{margin-bottom:13px}
.em-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.em-field input,.em-field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-family:'Heebo',sans-serif;font-size:13px;color:var(--text);outline:none}
.em-field input:focus,.em-field textarea:focus{border-color:var(--blue)}
.em-field textarea{resize:vertical;min-height:70px}
.em-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.em-err{color:var(--red);font-size:12px;padding:6px 0;display:none}

/* Permissions panel */
#perm-panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.perm-table-wrap{flex:1;overflow:auto;padding:20px}
.add-perm-row{display:flex;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.add-perm-row input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:'Heebo',sans-serif;font-size:13px;color:var(--text);outline:none;flex:1;min-width:180px}
.add-perm-row input:focus{border-color:var(--blue)}
.perm-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:'Heebo',sans-serif;font-size:13px;color:var(--text);outline:none}
.loader{color:var(--text2);padding:40px;text-align:center}
.empty{color:var(--text2);padding:40px;text-align:center;font-size:14px}

/* Scan Panel */
#scan-panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.scan-tabs{display:flex;gap:0;padding:14px 20px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.scan-tab{padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.scan-tab:hover{color:var(--text)}
.scan-tab.active{color:var(--blue-light);border-bottom-color:var(--blue)}
.scan-badge{background:var(--bg3);color:var(--text2);font-size:11px;padding:1px 7px;border-radius:8px;margin-right:6px}
.scan-badge.red{background:rgba(248,81,73,.15);color:var(--red)}
.scan-badge.orange{background:rgba(210,153,34,.15);color:var(--orange)}
.reason-cell{color:var(--red);font-size:12px}
.pending-cell{color:var(--orange)}
.action-delayed{color:var(--orange);font-size:11px}
.scan-badge.green{background:rgba(63,185,80,.15);color:var(--green)}
.thumb-wrap{width:56px;height:56px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid var(--border)}
.thumb-wrap img{width:56px;height:56px;object-fit:cover;transition:opacity .2s}
.thumb-wrap img:hover{opacity:.8}
.thumb-none{color:var(--text2);font-size:18px}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#lightbox img{max-width:90vw;max-height:82vh;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#lightbox-name{color:#fff;font-size:13px;opacity:.7}
#lightbox-close{position:absolute;top:16px;left:20px;background:none;border:none;color:#fff;font-size:26px;cursor:pointer;opacity:.7}
#lightbox-close:hover{opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap">
  <div class="login-card">
    <h1>🗄️ לוח ניהול DB</h1>
    <p>בתשובה — גישה מוגבלת למורשים בלבד</p>
    <div id="lc-err" class="lc-err"></div>
    <div class="lc-field"><label>אימייל</label><input id="lc-email" type="email" placeholder="admin@example.com" dir="ltr"/></div>
    <div class="lc-field"><label>סיסמה</label><input id="lc-pass" type="password" placeholder="••••••••" dir="ltr" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="lc-btn" onclick="doLogin()">כניסה</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-head">
      <h2>🗄️ DB Admin</h2>
      <span id="sb-perm" class="sb-perm"></span>
    </div>
    <div id="sb-tables"></div>
    <div class="sb-section">ניהול</div>
    <div class="sb-item" id="sb-scan-item" onclick="showScanPanel()">🔍 סריקות צניעות</div>
    <div class="sb-item" id="sb-perm-item" onclick="showPermPanel()">🔐 הרשאות</div>
    <div class="sb-footer">
      <div class="sb-user" id="sb-user"></div>
      <div class="sb-logout" onclick="logout()">התנתק</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="main-area">
    <div class="loader">בחר טבלה מהתפריט</div>
  </div>

  <!-- Scan Panel -->
  <div id="scan-panel">
    <div class="main-head">
      <h1>🔍 סריקות צניעות</h1>
      <button class="btn-sm" onclick="loadScanPanel(activeScanTab,scanOffset)">🔄 רענן</button>
    </div>
    <div class="scan-tabs">
      <div class="scan-tab active" id="stab-blocked" onclick="switchScanTab('blocked')">
        ⛔ נחסמו <span id="scan-badge-blocked" class="scan-badge red">—</span>
      </div>
      <div class="scan-tab" id="stab-pending" onclick="switchScanTab('pending')">
        ⏳ ממתינות לסריקה <span id="scan-badge-pending" class="scan-badge orange">—</span>
      </div>
      <div class="scan-tab" id="stab-approved" onclick="switchScanTab('approved')">
        ✅ אושרו <span id="scan-badge-approved" class="scan-badge green">—</span>
      </div>
    </div>
    <div class="table-wrap" id="scan-table-wrap"><div class="loader">טוען...</div></div>
    <div class="pagination" id="scan-pagination"></div>
  </div>

  <!-- Permissions Panel -->
  <div id="perm-panel" style="flex:1;flex-direction:column;overflow:hidden">
    <div class="main-head">
      <h1>🔐 ניהול הרשאות מנהלים</h1>
      <button class="btn-sm" onclick="loadPermPanel()">🔄 רענן</button>
    </div>
    <div class="add-perm-row" id="add-perm-row">
      <input id="perm-email" type="email" placeholder="אימייל המשתמש" dir="ltr"/>
      <select id="perm-level" class="perm-select">
        <option value="view">צפיה בלבד</option>
        <option value="edit">צפיה + עריכה</option>
      </select>
      <button class="btn-sm" onclick="addPerm()">הוסף הרשאה</button>
    </div>
    <div class="perm-table-wrap" id="perm-table-wrap">
      <div class="loader">טוען...</div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" onclick="if(event.target===this)closeEdit()">
  <div class="em-card">
    <div class="em-head">
      <h2 id="em-title">ערוך רשומה</h2>
      <button class="em-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="em-body" id="em-body"></div>
    <div class="em-foot">
      <div id="em-err" class="em-err"></div>
      <button class="btn-outline" onclick="closeEdit()">ביטול</button>
      <button class="btn-sm" onclick="saveEdit()">שמור</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt=""/>
  <div id="lightbox-name"></div>
</div>

<script>
const API = 'https://xo-app-betshuva.azurewebsites.net';
let token = localStorage.getItem('bt_admin_token') || localStorage.getItem('bt_token');
let adminPerm = null;
let currentTable = null;
let currentOffset = 0;
let currentTotal  = 0;
let currentRows   = [];
let editRow       = null;
let editRowPk     = null;
const PAGE = 100;

// ── Auth ──────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('lc-email').value.trim();
  const pass  = document.getElementById('lc-pass').value;
  const err   = document.getElementById('lc-err');
  err.style.display = 'none';
  if (!email || !pass) { err.textContent='מלא אימייל וסיסמה'; err.style.display='block'; return; }
  try {
    const res  = await fetch(`${API}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const data = await res.json();
    if (!res.ok) { err.textContent=data.error||'שגיאה'; err.style.display='block'; return; }
    token = data.token;
    localStorage.setItem('bt_admin_token', token);
    startApp();
  } catch { err.textContent='שגיאת חיבור'; err.style.display='block'; }
}

function logout() {
  localStorage.removeItem('bt_admin_token');
  token = null; adminPerm = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'flex';
}

// ── App Init ──────────────────────────────────────────────────────
async function startApp() {
  if (!token) return;
  try {
    const res  = await fetch(`${API}/api/admin/db`,{headers:{Authorization:`Bearer ${token}`}});
    if (res.status === 401 || res.status === 403) {
      const d = await res.json();
      document.getElementById('lc-err').textContent = d.error || 'אין הרשאה';
      document.getElementById('lc-err').style.display = 'block';
      return;
    }
    const data  = await res.json();
    adminPerm   = data.permission;
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app').style.display        = 'flex';

    // Decode user from token
    try {
      const p    = token.split('.')[1];
      const uint8 = Uint8Array.from(atob(p.replace(/-/g,'+').replace(/_/g,'/')), c=>c.charCodeAt(0));
      const me   = JSON.parse(new TextDecoder().decode(uint8));
      document.getElementById('sb-user').textContent = me.name || me.email || '';
    } catch {}

    const permEl = document.getElementById('sb-perm');
    permEl.textContent   = adminPerm === 'edit' ? '✏️ עריכה' : '👁️ צפיה';
    permEl.className     = 'sb-perm ' + (adminPerm==='edit'?'perm-edit':'perm-view');

    if (adminPerm !== 'edit') document.getElementById('sb-perm-item').style.display = 'none';

    // Build sidebar
    const sb = document.getElementById('sb-tables');
    sb.innerHTML = data.tables.map(t =>
      `<div class="sb-item" id="sb-${t.table}" onclick="loadTable('${t.table}')">
         ${t.label} <span class="cnt">${t.count.toLocaleString()}</span>
       </div>`).join('');
  } catch (e) {
    alert('שגיאה: ' + e.message);
  }
}

// ── Table View ────────────────────────────────────────────────────
const TABLE_LABELS = {
  users:'👤 משתמשים', groups:'👥 קבוצות', group_members:'🔗 חברי קבוצות',
  messages:'💬 הודעות', message_status:'📨 סטטוס הודעות',
  blocked_users:'🚫 חסומים', fcm_tokens:'🔔 FCM Tokens',
  activity_log:'📊 פעילות', audit_log:'🔍 אודיט', admin_permissions:'🔐 הרשאות'
};
const TABLE_PK = {
  users:'id', groups:'id', messages:'id', fcm_tokens:'id',
  activity_log:'id', audit_log:'id', admin_permissions:'user_id'
};

async function loadTable(name, offset=0) {
  currentTable  = name;
  currentOffset = offset;

  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const sbEl = document.getElementById('sb-'+name);
  if (sbEl) sbEl.classList.add('active');

  document.getElementById('perm-panel').style.display = 'none';
  const main = document.getElementById('main-area');
  main.style.display = 'flex';
  main.innerHTML = '<div class="loader">טוען...</div>';

  try {
    const res  = await fetch(`${API}/api/admin/db/${name}?limit=${PAGE}&offset=${offset}`,
      {headers:{Authorization:`Bearer ${token}`}});
    const data = await res.json();
    if (!res.ok) { main.innerHTML=`<div class="loader" style="color:var(--red)">${data.error}</div>`; return; }
    currentRows  = data.rows;
    currentTotal = data.total;

    if (!data.rows.length) { main.innerHTML='<div class="empty">אין רשומות</div>'; return; }

    const cols    = Object.keys(data.rows[0]);
    const pk      = TABLE_PK[name];
    const canEdit = adminPerm === 'edit' && pk;

    main.innerHTML = `
      <div class="main-head">
        <h1>${TABLE_LABELS[name]||name}</h1>
        <span class="cnt-badge">${data.total.toLocaleString()} רשומות</span>
        <div class="search-wrap">
          <input placeholder="חפש..." onchange="searchTable(this.value,'${name}')"/>
          <button class="btn-outline" onclick="loadTable('${name}',${offset})">🔄</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            ${cols.map(c=>`<th>${c}</th>`).join('')}
            ${canEdit?'<th>פעולות</th>':''}
          </tr></thead>
          <tbody>
            ${data.rows.map(row=>`<tr>
              ${cols.map(c=>`<td title="${escHtml(String(row[c]??''))}">${renderCell(c,row[c])}</td>`).join('')}
              ${canEdit?`<td class="td-actions">
                <button class="btn-edit" onclick="openEdit('${name}','${escHtml(String(row[pk]??''))}')">✏️</button>
                <button class="btn-del" onclick="deleteRow('${name}','${escHtml(String(row[pk]??''))}')">🗑️</button>
              </td>`:''}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <button class="pag-btn" onclick="loadTable('${name}',${Math.max(0,offset-PAGE)})" ${offset===0?'disabled':''}>◀ הקודם</button>
        <span>${offset+1}–${Math.min(offset+PAGE,data.total)} מתוך ${data.total.toLocaleString()}</span>
        <button class="pag-btn" onclick="loadTable('${name}',${offset+PAGE})" ${offset+PAGE>=data.total?'disabled':''}>הבא ▶</button>
      </div>`;
  } catch(e) {
    main.innerHTML = `<div class="loader" style="color:var(--red)">שגיאה: ${e.message}</div>`;
  }
}

async function searchTable(q, name) {
  if (!q) { loadTable(name, 0); return; }
  const res  = await fetch(`${API}/api/admin/db/${name}?limit=200&search=${encodeURIComponent(q)}`,
    {headers:{Authorization:`Bearer ${token}`}});
  const data = await res.json();
  // Re-render just the tbody
  if (!data.rows || !data.rows.length) return;
  const cols = Object.keys(data.rows[0]);
  const pk   = TABLE_PK[name];
  const canEdit = adminPerm==='edit' && pk;
  document.querySelector('.table-wrap table tbody').innerHTML =
    data.rows.map(row=>`<tr>
      ${cols.map(c=>`<td title="${escHtml(String(row[c]??''))}">${renderCell(c,row[c])}</td>`).join('')}
      ${canEdit?`<td class="td-actions">
        <button class="btn-edit" onclick="openEdit('${name}','${escHtml(String(row[pk]??''))}')">✏️</button>
        <button class="btn-del" onclick="deleteRow('${name}','${escHtml(String(row[pk]??''))}')">🗑️</button>
      </td>`:''}
    </tr>`).join('');
}

function renderCell(col, val) {
  if (val === null || val === undefined) return '<span style="color:var(--text2)">NULL</span>';
  const s = String(val);
  if (col === 'id' || col.endsWith('_id')) return `<span class="td-id">${s.slice(0,8)}…</span>`;
  if (col.endsWith('_at') || col === 'created_at') return `<span class="td-date">${fmtDate(s)}</span>`;
  if (s === 'true'  || val === true  || val === 1) return '<span class="td-bool-true">✓</span>';
  if (s === 'false' || val === false || val === 0) return '<span class="td-bool-false">✗</span>';
  if (s.length > 60) return escHtml(s.slice(0,60)) + '…';
  return escHtml(s);
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('he-IL') + ' ' + d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Edit ──────────────────────────────────────────────────────────
function openEdit(table, pkVal) {
  const row = currentRows.find(r => String(r[TABLE_PK[table]]) === pkVal);
  if (!row) return;
  editRow  = { ...row };
  editRowPk = pkVal;
  document.getElementById('em-title').textContent = `ערוך רשומה — ${TABLE_LABELS[table]||table}`;
  document.getElementById('em-err').style.display = 'none';
  const pk   = TABLE_PK[table];
  const body = document.getElementById('em-body');
  body.innerHTML = Object.entries(row).map(([k, v]) => {
    const readonly = k === pk;
    const long     = v && String(v).length > 80;
    return `<div class="em-field">
      <label>${k}${readonly?' (מזהה — לא ניתן לשינוי)':''}</label>
      ${long
        ? `<textarea name="${k}" ${readonly?'readonly disabled':''}>${escHtml(v??'')}</textarea>`
        : `<input  name="${k}" value="${escHtml(String(v??''))}" ${readonly?'readonly disabled':''}/>`
      }
    </div>`;
  }).join('');
  document.getElementById('em-title').dataset.table = table;
  document.getElementById('edit-modal').style.display = 'flex';
}

function closeEdit() { document.getElementById('edit-modal').style.display='none'; }

async function saveEdit() {
  const table = document.getElementById('em-title').dataset.table;
  const pk    = TABLE_PK[table];
  const inputs = document.getElementById('em-body').querySelectorAll('[name]:not([disabled])');
  const updates = {};
  inputs.forEach(el => { updates[el.name] = el.value || null; });
  const errEl = document.getElementById('em-err');
  errEl.style.display = 'none';
  try {
    const res  = await fetch(`${API}/api/admin/db/${table}/${encodeURIComponent(editRowPk)}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
      body: JSON.stringify(updates)
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent=data.error||'שגיאה'; errEl.style.display='block'; return; }
    closeEdit();
    loadTable(table, currentOffset);
  } catch(e) { errEl.textContent=e.message; errEl.style.display='block'; }
}

async function deleteRow(table, pkVal) {
  if (!confirm('למחוק רשומה זו?')) return;
  try {
    const res  = await fetch(`${API}/api/admin/db/${table}/${encodeURIComponent(pkVal)}`,{
      method:'DELETE', headers:{Authorization:`Bearer ${token}`}
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error||'שגיאה'); return; }
    loadTable(table, currentOffset);
    // Update sidebar count
    const sbEl = document.getElementById('sb-'+table);
    if (sbEl) {
      const cnt = sbEl.querySelector('.cnt');
      if (cnt) cnt.textContent = Math.max(0, parseInt(cnt.textContent)-1);
    }
  } catch(e) { alert(e.message); }
}

// ── Permissions Panel ─────────────────────────────────────────────
function showPermPanel() {
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('sb-perm-item').classList.add('active');
  document.getElementById('main-area').style.display  = 'none';
  document.getElementById('perm-panel').style.display = 'flex';
  loadPermPanel();
}

async function loadPermPanel() {
  document.getElementById('perm-table-wrap').innerHTML = '<div class="loader">טוען...</div>';
  try {
    const res  = await fetch(`${API}/api/admin/permissions`,{headers:{Authorization:`Bearer ${token}`}});
    const data = await res.json();
    if (!data.length) { document.getElementById('perm-table-wrap').innerHTML='<div class="empty">אין הרשאות רשומות</div>'; return; }
    document.getElementById('perm-table-wrap').innerHTML = `
      <table>
        <thead><tr><th>שם</th><th>אימייל</th><th>הרשאה</th><th>תאריך</th><th>הסרה</th></tr></thead>
        <tbody>
          ${data.map(p=>`<tr>
            <td><strong>${escHtml(p.name||'')}</strong></td>
            <td>${escHtml(p.email||'')}</td>
            <td><span class="sb-perm ${p.permission==='edit'?'perm-edit':'perm-view'}">${p.permission==='edit'?'✏️ עריכה':'👁️ צפיה'}</span></td>
            <td class="td-date">${fmtDate(p.granted_at)}</td>
            <td><button class="btn-del" onclick="removePerm('${p.user_id}')">🗑️</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) { document.getElementById('perm-table-wrap').innerHTML=`<div class="loader" style="color:var(--red)">${e.message}</div>`; }
}

async function addPerm() {
  const email = document.getElementById('perm-email').value.trim();
  const perm  = document.getElementById('perm-level').value;
  if (!email) return;
  try {
    const res  = await fetch(`${API}/api/admin/permissions`,{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
      body: JSON.stringify({email, permission:perm})
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error||'שגיאה'); return; }
    document.getElementById('perm-email').value = '';
    loadPermPanel();
  } catch(e) { alert(e.message); }
}

async function removePerm(userId) {
  if (!confirm('להסיר הרשאה?')) return;
  try {
    const res  = await fetch(`${API}/api/admin/permissions/${userId}`,{
      method:'DELETE', headers:{Authorization:`Bearer ${token}`}
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error||'שגיאה'); return; }
    loadPermPanel();
  } catch(e) { alert(e.message); }
}

// ── Scan Panel ────────────────────────────────────────────────────
let activeScanTab = 'blocked';
let scanOffset    = 0;
const SCAN_PAGE   = 100;

function showScanPanel() {
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  document.getElementById('sb-scan-item').classList.add('active');
  document.getElementById('main-area').style.display  = 'none';
  document.getElementById('perm-panel').style.display = 'none';
  document.getElementById('scan-panel').style.display = 'flex';
  loadScanPanel(activeScanTab, 0);
}

function switchScanTab(type) {
  activeScanTab = type;
  scanOffset    = 0;
  document.querySelectorAll('.scan-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('stab-' + type).classList.add('active');
  loadScanPanel(type, 0);
}

function thumbCell(fileUrl, fileName, fileType) {
  if (fileUrl && fileType === 'image') {
    return `<div class="thumb-wrap" onclick="openLightbox('${escHtml(fileUrl)}','${escHtml(fileName||'')}')">
              <img src="${escHtml(fileUrl)}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'thumb-none\\'>🖼️</span>'"/>
            </div>`;
  }
  if (fileType === 'document') return '<div class="thumb-wrap"><span class="thumb-none">📄</span></div>';
  return '<div class="thumb-wrap"><span class="thumb-none">📎</span></div>';
}

function openLightbox(url, name) {
  document.getElementById('lightbox-img').src  = url;
  document.getElementById('lightbox-name').textContent = name;
  document.getElementById('lightbox').style.display = 'flex';
}
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeLightbox(); });

async function loadScanPanel(type, offset) {
  scanOffset = offset;
  const wrap = document.getElementById('scan-table-wrap');
  const pag  = document.getElementById('scan-pagination');
  wrap.innerHTML = '<div class="loader">טוען...</div>';
  pag.innerHTML  = '';
  try {
    const res  = await fetch(`${API}/api/admin/scans?type=${type}&limit=${SCAN_PAGE}&offset=${offset}`,
      { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    if (!res.ok) { wrap.innerHTML = `<div class="loader" style="color:var(--red)">${data.error}</div>`; return; }

    document.getElementById('scan-badge-' + type).textContent = data.total.toLocaleString();
    if (!data.rows.length) { wrap.innerHTML = '<div class="empty">אין רשומות</div>'; return; }

    if (type === 'blocked') {
      wrap.innerHTML = `
        <table>
          <thead><tr>
            <th></th><th>תאריך</th><th>משתמש</th><th>שם קובץ</th>
            <th>סיבת חסימה</th><th>זמן</th><th>IP</th>
          </tr></thead>
          <tbody>
            ${data.rows.map(r => `<tr>
              <td style="padding:6px 10px">${thumbCell(r.file_url, r.file_name, r.file_type)}</td>
              <td class="td-date">${fmtDate(r.created_at)}</td>
              <td title="${escHtml(r.user_email||'')}">${escHtml(r.user_name||'—')}</td>
              <td title="${escHtml(r.file_name||'')}">${escHtml((r.file_name||'—').slice(0,36))}</td>
              <td class="reason-cell" title="${escHtml(r.reason||'')}">${escHtml((r.reason||'—').slice(0,50))}</td>
              <td>${r.action==='blocked_upload_delayed'
                ? '<span class="action-delayed">⏱ בדיעבד</span>'
                : '<span style="color:var(--green);font-size:11px">⚡ מיידי</span>'}</td>
              <td class="td-id">${escHtml(r.ip||'—')}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } else if (type === 'pending') {
      wrap.innerHTML = `
        <table>
          <thead><tr>
            <th></th><th>תאריך</th><th>שולח</th><th>נמען</th><th>שם קובץ</th>
            <th>ניסיונות</th><th>סריקה אחרונה</th>
            ${adminPerm==='edit'?'<th>פעולות</th>':''}
          </tr></thead>
          <tbody>
            ${data.rows.map(r => `<tr>
              <td style="padding:6px 10px">${thumbCell(r.file_url, r.file_name, r.file_type)}</td>
              <td class="td-date">${fmtDate(r.created_at)}</td>
              <td title="${escHtml(r.sender_email||'')}">${escHtml(r.sender_name||'—')}</td>
              <td>${escHtml(r.recipient_name||'—')}</td>
              <td title="${escHtml(r.file_url||'')}">${escHtml((r.file_name||'—').slice(0,36))}</td>
              <td class="pending-cell">${r.retry_count}</td>
              <td class="td-date">${r.last_retry ? fmtDate(r.last_retry) : '—'}</td>
              ${adminPerm==='edit'?`<td class="td-actions">
                <button class="btn-del" onclick="deletePending(${r.id})" title="מחק מהמתנה">🗑️</button>
              </td>`:''}
            </tr>`).join('')}
          </tbody>
        </table>`;
    } else {
      // approved
      wrap.innerHTML = `
        <table>
          <thead><tr>
            <th></th><th>תאריך</th><th>שולח</th><th>נמען</th><th>שם קובץ</th><th>סוג</th><th>אישור</th>
          </tr></thead>
          <tbody>
            ${data.rows.map(r => `<tr>
              <td style="padding:6px 10px">${thumbCell(r.file_url, r.file_name, r.file_type)}</td>
              <td class="td-date">${fmtDate(r.created_at)}</td>
              <td title="${escHtml(r.user_email||'')}">${escHtml(r.user_name||'—')}</td>
              <td>${escHtml(r.recipient_name||'—')}</td>
              <td title="${escHtml(r.file_name||'')}">${escHtml((r.file_name||'—').slice(0,40))}</td>
              <td>${escHtml(r.file_type||'—')}</td>
              <td>${r.action==='send_file_delayed'
                ? '<span class="action-delayed">⏱ בדיעבד</span>'
                : r.action==='upload_pending'
                ? '<span style="color:var(--orange);font-size:11px">⏳ ממתין לסריקה</span>'
                : '<span style="color:var(--green);font-size:11px">⚡ מיידי</span>'}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    const total = data.total;
    pag.innerHTML = `
      <button class="pag-btn" onclick="loadScanPanel('${type}',${Math.max(0,offset-SCAN_PAGE)})" ${offset===0?'disabled':''}>◀ הקודם</button>
      <span>${offset+1}–${Math.min(offset+SCAN_PAGE,total)} מתוך ${total.toLocaleString()}</span>
      <button class="pag-btn" onclick="loadScanPanel('${type}',${offset+SCAN_PAGE})" ${offset+SCAN_PAGE>=total?'disabled':''}>הבא ▶</button>`;
  } catch (e) {
    wrap.innerHTML = `<div class="loader" style="color:var(--red)">שגיאה: ${e.message}</div>`;
  }
}

async function deletePending(id) {
  if (!confirm('למחוק קובץ זה מרשימת ההמתנה?')) return;
  try {
    const res  = await fetch(`${API}/api/admin/scans/pending/${id}`,
      { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    if (!res.ok) { alert(data.error || 'שגיאה'); return; }
    loadScanPanel('pending', scanOffset);
  } catch (e) { alert(e.message); }
}

// ── Start ─────────────────────────────────────────────────────────
startApp();
</script>
</body>
